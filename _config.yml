# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

# Site settings
title: 亚雄的博客
SEOTitle: Jingming(Yaxiong)的博客 | Yaxiong Blog
keyword: "软件工程师, 后端开发, 系统设计, Leetcode, 圣经研读, SOP, Web开发, Ruby on Rails, 工作方法论"
header-img: img/post-bg-desk.jpg
email: jingminglake@gmail.com
description: "亚雄的技术与信仰博客，分享软件工程师工作SOP、后端开发、系统设计、Leetcode题解、圣经研读等内容。"

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.micili.cn" # the base hostname & protocol for your site
#twitter_username: jekyllrb
github_username:  jingminglake


# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "Unless a grain of wheat falls into the ground and dies, it remains alone; but if it dies, it produces much grain."
sidebar-avatar: /img/about-me.png

# Build settings
#theme: minima
#plugins:
#  - jekyll-feed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md","CLAUDE.md","agents","tasks","_templates"]
anchorjs: true



# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM                            # use Github Flavored Markdown !important


# 评论系统
# Disqus（https://disqus.com/）
disqus_username: jingming

# Google Analytics
ga_track_id: 'G-GKLEVYMG3C'              # Format: G-XXXXXXXXXX (GA4)





# Featured Tags
featured-tags: true                     # 是否使用首页标签
featured-condition-size: 1              # 相同标签数量大于这个数，才会出现在首页

