name: Build and Deploy Jekyll Site

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Update dependencies
        run: bundle update

      - name: Install dependencies
        run: bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Check broken links
        run: |
          gem install html-proofer -v '~> 5.0'
          htmlproofer ./_site \
            --ignore-status-codes "403,429,999" \
            --ignore-urls "/fonts.googleapis.com/,/fonts.gstatic.com/" \
            --no-enforce-https \
            --allow-missing-href \
            --swap-urls "^https?\://www\.micili\.cn:" \
            --checks Links \
            --only-4xx
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://www.micili.cn/
            https://www.micili.cn/2017/09/24/Leetcode%E6%80%BB%E7%BB%93-%E4%B8%80/
          runs: 1
          uploadArtifacts: true

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
